<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Pattern Picker</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
      }

      header {
        background: #020617;
        padding: 20px;
        text-align: center;
        border-bottom: 1px solid #334155;
      }

      header h1 {
        margin: 0;
        color: #38bdf8;
      }

      nav {
        margin-top: 10px;
      }

      nav a {
        color: #cbd5e1;
        margin: 0 10px;
        text-decoration: none;
      }

      .ad-banner {
        background: #1e293b;
        border: 2px dashed #64748b;
        color: #94a3b8;
        text-align: center;
        padding: 20px;
        margin: 20px auto;
        max-width: 900px;
        border-radius: 12px;
      }

      .layout {
        display: grid;
        grid-template-columns: 180px 1fr 180px;
        gap: 20px;
        max-width: 1100px;
        margin: auto;
        padding: 20px;
      }

      .side-ad {
        background: #1e293b;
        border: 2px dashed #64748b;
        color: #94a3b8;
        min-height: 400px;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .container {
        background: #111827;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
      }

      .note {
        color: #cbd5e1;
        font-size: 14px;
        margin-bottom: 20px;
      }

      select,
      button {
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        margin: 5px;
      }

      select {
        background: #1f2937;
        color: white;
        border: 1px solid #334155;
      }

      button {
        background: #06b6d4;
        color: white;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        background: #0891b2;
      }

      .grid {
        display: grid;
        gap: 8px;
        justify-content: center;
        margin: 25px 0;
      }

      .grid-5 {
        grid-template-columns: repeat(5, 55px);
      }

      .grid-3 {
        grid-template-columns: repeat(3, 65px);
      }

      .cell {
        height: 55px;
        background: #1f2937;
        border: 2px solid #334155;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
      }

      .press-list {
        margin-top: 15px;
        background: #020617;
        padding: 15px;
        border-radius: 12px;
        color: #e2e8f0;
        font-size: 15px;
      }

      .hidden {
        display: none;
      }

      footer {
        background: #020617;
        text-align: center;
        padding: 20px;
        color: #94a3b8;
        margin-top: 30px;
        border-top: 1px solid #334155;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .side-ad {
          min-height: 120px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Game Pattern Picker</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="#">Games</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <div class="ad-banner">Top Banner Ad Space</div>

    <main class="layout">
      <aside class="side-ad">Left Ad Space</aside>

      <section class="container">
        <h2>Choose Your Game</h2>
        <p class="note">
          Demo picker only. This does NOT predict real game outcomes.
        </p>

        <select id="gameSelect" onchange="changeGame()">
          <option value="gem">5x5 Gem Pattern</option>
          <option value="press">10x3 Press Picker</option>
        </select>

        <select id="modeSelect" class="hidden">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>

        <button onclick="generateGame()">Generate Pattern</button>

        <div id="grid" class="grid"></div>

        <div id="pressList" class="press-list hidden"></div>
      </section>

      <aside class="side-ad">Right Ad Space</aside>
    </main>

    <div class="ad-banner">Bottom Banner Ad Space</div>

    <footer>© 2026 Game Pattern Picker. All rights reserved.</footer>

    <script>
      function generateGridPattern(rows = 5, cols = 5, picks = 5) {
        let total = rows * cols;
        let selected = new Set();

        while (selected.size < picks) {
          selected.add(Math.floor(Math.random() * total));
        }

        let grid = [];
        let index = 0;

        for (let i = 0; i < rows; i++) {
          let row = [];
          for (let j = 0; j < cols; j++) {
            row.push(selected.has(index) ? "💎" : "⬜");
            index++;
          }
          grid.push(row);
        }

        return grid;
      }

      const rows = 10;
      const cols = 3;
      const playableRows = [7, 8, 9];

      function createBoardData() {
        const board = [];

        for (let r = 0; r < rows; r++) {
          const row = [];
          for (let c = 0; c < cols; c++) {
            row.push({
              row: r,
              col: c,
              suggested: false,
              alt: false,
            });
          }
          board.push(row);
        }

        return board;
      }

      function generateSuggestions(mode = "easy") {
        const board = createBoardData();

        playableRows.forEach((r) => {
          const mainPick = Math.floor(Math.random() * cols);
          board[r][mainPick].suggested = true;

          if (mode === "medium") {
            const altPick =
              (mainPick + 1 + Math.floor(Math.random() * 2)) % cols;
            board[r][altPick].alt = true;
          }

          if (mode === "hard") {
            for (let c = 0; c < cols; c++) {
              if (c !== mainPick) {
                board[r][c].alt = true;
              }
            }
          }
        });

        return board;
      }

      function getPressPositions(board) {
        const positions = [];

        board.forEach((row) => {
          row.forEach((cell) => {
            if (cell.suggested) {
              positions.push({
                row: cell.row + 1,
                col: cell.col + 1,
              });
            }
          });
        });

        return positions;
      }

      function changeGame() {
        const game = document.getElementById("gameSelect").value;
        const modeSelect = document.getElementById("modeSelect");

        if (game === "press") {
          modeSelect.classList.remove("hidden");
        } else {
          modeSelect.classList.add("hidden");
        }

        generateGame();
      }

      function generateGame() {
        const game = document.getElementById("gameSelect").value;
        const gridContainer = document.getElementById("grid");
        const pressList = document.getElementById("pressList");

        gridContainer.innerHTML = "";
        pressList.innerHTML = "";
        pressList.classList.add("hidden");

        if (game === "gem") {
          gridContainer.className = "grid grid-5";

          const pattern = generateGridPattern();

          pattern.forEach((row) => {
            row.forEach((cell) => {
              const div = document.createElement("div");
              div.className = "cell";
              div.textContent = cell;
              gridContainer.appendChild(div);
            });
          });
        }

        if (game === "press") {
          gridContainer.className = "grid grid-3";

          const mode = document.getElementById("modeSelect").value;
          const board = generateSuggestions(mode);

          board.forEach((row) => {
            row.forEach((cell) => {
              const div = document.createElement("div");
              div.className = "cell";

              if (cell.suggested) {
                div.textContent = "💎";
              } else if (cell.alt) {
                div.textContent = "🔸";
              } else {
                div.textContent = "⬜";
              }

              gridContainer.appendChild(div);
            });
          });

          const positions = getPressPositions(board)
            .map((pos) => `Row ${pos.row}, Column ${pos.col}`)
            .join("<br>");

          pressList.classList.remove("hidden");
          pressList.innerHTML = `<strong>Press these positions:</strong><br>${positions}`;
        }
      }

      generateGame();
    </script>
  </body>
</html>
